<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Cherry</title>
<link rel="stylesheet" href="styles_registro.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<section class="section-list">
<ul class="s-list">
<li><a href="index.html">Inicio</a></li>
<li>Iniciar sesión</li>
</ul>
</section>

<div class="auth-container">

<div class="auth-card">
<h1 class="logo">Cherry</h1>
<h2>Iniciar sesión</h2>
<form onsubmit="login(event)">

<div class="input-group">
<i class="fas fa-user"></i>
<input type="text" id="correo" placeholder="Usuario" required>
</div>

<div class="input-group">
<i class="fas fa-lock"></i>
<input type="password" id="password" placeholder="Contraseña" required>
</div>

<button class="button-carrito" type="submit">Ingresar</button>
<p id="mensaje-login"></p>
<p class="auth-link">
¿No tienes cuenta? <a href="registro.html">Regístrate</a>
</p>
</form>
</div>

</div>
<script src="script.js"></script>
</body>
</html>
